version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: dopamina-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_dopamina_secure
      MYSQL_DATABASE: dopamina_crew_db
      MYSQL_USER: dopamina_user
      MYSQL_PASSWORD: dopamina_secure_password123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  mysql-data:
