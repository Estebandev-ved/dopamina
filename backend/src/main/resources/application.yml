server:
  port: 8080

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/dopamina_crew_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DATABASE_USER:dopamina_user}
    password: ${DATABASE_PASSWORD:dopamina_secure_password123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# Custom Application Configs for JWT Security
app:
  jwt:
    # 256-bit secret key (Hex encoded)
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    # 24 Hours expiration (24 * 60 * 60 * 1000)
    expiration-ms: 86400000
