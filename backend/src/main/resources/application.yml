server:
  port: 8080

spring:
  # Perfil activo por defecto: dev. En producción ejecuta con SPRING_PROFILES_ACTIVE=prod
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/dopamina_crew_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DATABASE_USER:dopamina_user}
    password: ${DATABASE_PASSWORD:dopamina_secure_password123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# Custom Application Configs for JWT Security
app:
  jwt:
    # Valor SOLO para desarrollo local. En producción es OBLIGATORIO definir JWT_SECRET
    # (ver application-prod.yml, que no tiene valor por defecto y falla si no se define).
    secret: ${JWT_SECRET:DEV_ONLY_SECRET_4F2A9C7E1B8D60553A2F90CE1147BB8E55DA12CC9077E3B41A6F8821D034EE5C}
    # 24 Hours expiration (24 * 60 * 60 * 1000)
    expiration-ms: 86400000
  cors:
    # Orígenes permitidos (separados por coma). En dev: front local de Vite.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Efipay Payment Gateway Configuration
efipay:
  api-url: ${EFIPAY_API_URL:https://sag.efipay.co/api/v1}
  access-token: ${EFIPAY_ACCESS_TOKEN:}
  office-id: ${EFIPAY_OFFICE_ID:1}
  webhook-token: ${EFIPAY_WEBHOOK_TOKEN:}
  commerce-id: ${EFIPAY_COMMERCE_ID:}
  checkout-template-id: ${EFIPAY_CHECKOUT_TEMPLATE_ID:}
  redirect-base-url: ${EFIPAY_REDIRECT_BASE_URL:http://localhost:5173}
  # URL pública del backend (para el webhook). En prod: https://api.tudominio.com
  backend-base-url: ${EFIPAY_BACKEND_BASE_URL:http://localhost:8080}

# Resend Email Configuration
resend:
  api-key: ${RESEND_API_KEY:YOUR_RESEND_API_KEY}
  admin-email: ${RESEND_ADMIN_EMAIL:admin@dopaminacrew.com}
  test-mode: ${RESEND_TEST_MODE:true}
  test-email: ${RESEND_TEST_EMAIL:prueba@dopaminaeventos.shop}
  from:
    general: ${RESEND_FROM_GENERAL:"Dopamina Crew" <noreply@dopaminacrew.com>}
    facturas: ${RESEND_FROM_FACTURAS:"Tribu Facturación" <facturas@tribucol.shop>}
    seguridad: ${RESEND_FROM_SEGURIDAD:"Tribu Seguridad" <seguridad@tribucol.shop>}

# Facebook Conversions API (CAPI)
facebook:
  pixel:
    id: ${FACEBOOK_PIXEL_ID:1667872257652141}
  access:
    token: ${FACEBOOK_ACCESS_TOKEN:}
